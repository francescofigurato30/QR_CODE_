<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Le Nostre Strutture</title>
    <style>
        :root {
            --bg: #F5F0E8;
            --card-bg: #FFFFFF;
            --text: #1A1A1A;
            --accent: #C4714A;
            --navy: #1E2D40;
            --shadow: 0 4px 15px rgba(30, 15, 5, 0.08);
            --border: rgba(60, 40, 20, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }
        
        header { text-align: center; margin: 15px 0 25px; }
        header h1 { font-size: 1.5rem; color: var(--navy); font-weight: 700; }
        header p { font-size: 0.88rem; color: #666; margin-top: 6px; }

        /* VISTA HOME - SCELTA STRUTTURA */
        .menu-case { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .casa-card { background: var(--card-bg); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); cursor: pointer; }
        .casa-card:active { opacity: 0.95; transform: scale(0.99); }
        .casa-card img { width: 100%; height: 210px; object-fit: cover; display: block; }
        .casa-card h2 { padding: 16px; font-size: 1.2rem; text-align: center; color: var(--navy); font-weight: 600; }

        /* VISTA DETTAGLIO */
        .dettaglio-casa { display: none; background: var(--card-bg); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .btn-indietro { background: var(--navy); color: white; border: none; padding: 11px 18px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; margin-bottom: 20px; cursor: pointer; width: 100%; text-align: center; }
        .btn-indietro:active { opacity: 0.9; }
        
        /* GALLERIA FOTO INTERNA */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .gallery img { width: 100%; height: 115px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); background: #eee; }
        
        /* SEZIONI INFO */
        .info-section { margin-top: 22px; }
        .info-section h3 { font-size: 1.05rem; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid rgba(196,113,74,0.2); padding-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
        .info-section p { font-size: 0.95rem; line-height: 1.5; color: #3A3A3A; }
        
        /* LISTA PUNTI INTERESSE */
        .ul-punti { list-style: none; }
        .ul-punti li { font-size: 0.95rem; padding: 6px 0; color: #3A3A3A; border-bottom: 1px dashed var(--border); }
        .ul-punti li:last-child { border-bottom: none; }

        @media(min-width: 600px) {
            body { max-width: 550px; margin: 0 auto; padding: 30px 16px; }
            .btn-indietro { width: auto; display: inline-block; }
        }
    </style>
</head>
<body>

    <div id="home-view">
        <header>
            <h1>Benvenuto nelle nostre strutture</h1>
            <p>Seleziona una casa per scoprire foto, dettagli e punti d'interesse</p>
        </header>

        <div class="menu-case">
            <div class="casa-card" onclick="mostraCasa('paese1')">
                <img src="casa_paese.png" alt="Casa Paese Piano 1°">
                <h2>🏠 Casa Paese Piano 1°</h2>
            </div>
            
            <div class="casa-card" onclick="mostraCasa('stazione')">
                <img src="casa_stazione.png" alt="Casa Stazione">
                <h2>🚉 Casa Stazione</h2>
            </div>
        </div>
    </div>

    <div id="detail-view" class="dettaglio-casa">
        <button class="btn-indietro" onclick="mostraHome()">← Cambia struttura</button>
        <h1 id="det-titolo" style="color: var(--navy); margin-bottom: 5px;"></h1>
        
        <div class="info-section">
            <h3>📍 Indirizzo</h3>
            <p id="det-indirizzo"></p>
        </div>

        <div class="info-section">
            <h3>📸 Galleria Foto</h3>
            <div class="gallery" id="det-gallery"></div>
        </div>

        <div class="info-section">
            <h3>✨ Punti di Interesse nelle Vicinanze</h3>
            <ul class="ul-punti" id="det-punti"></ul>
        </div>
    </div>

    <script>
        const datiCase = {
            paese1: {
                titolo: "🏠 Casa Paese Piano 1°",
                indirizzo: "Via Roma, 15 - Centro Storico", 
                foto: [
                    "Foto qr code casa paese/casa_paese_cucina.jpg",
                    "Foto qr code casa paese/casa_paese_cucina2.jpg",
                    "Foto qr code casa paese/casa_paese_bagno.jpg",
                    "Foto qr code casa paese/casa_paese_camera.jpg",
                    "Foto qr code casa paese/casa_paese_soggiorno.jpg"
                ],
                punti: [
                    "⛪ Santuario di San Francesco (5 minuti a piedi)",
                    "🍕 Piazza principale con bar e ristoranti (2 minuti a piedi)",
                    "🛒 Supermercato e servizi (200 metri)"
                ]
            },
            stazione: {
                titolo: "🚉 Casa Stazione",
                indirizzo: "Viale della Libertà, 42 - Zona Stazione / Mare",
                foto: [
                    "Foto qr code casa stazione/casa_stazione_cucina.jpg",
                    "Foto qr code casa stazione/casa_stazione_cucina2.jpg",
                    "Foto qr code casa stazione/casa_stazione_ingresso.jpg",
                    "Foto qr code casa stazione/casa_stazione_soggiorno.jpg",
                    "Foto qr code casa stazione/casa_stazione_camera1.jpg",
                    "Foto qr code casa stazione/casa_stazione_camera1.1.jpg",
                    "Foto qr code casa stazione/casa_stazione_camera2.jpg",
                    "Foto qr code casa stazione/casa_stazione_vista.jpg"
                ],
                punti: [
                    "🏖️ Spiaggia e Lungomare (3 minuti a piedi)",
                    "🚂 Stazione Ferroviaria (1 minuto a piedi)",
                    "☕ Bar, Pasticcerie e Tabacchi (nelle immediate vicinanze)"
                ]
            }
        };

        function mostraCasa(id) {
            const casa = datiCase[id];
            if(!casa) return;

            document.getElementById('det-titolo').textContent = casa.titolo;
            document.getElementById('det-indirizzo').textContent = casa.indirizzo;

            document.getElementById('det-gallery').innerHTML = casa.foto.map(f => {
                return `<img src="${encodeURI(f)}" alt="Foto stanza">`;
            }).join('');

            document.getElementById('det-punti').innerHTML = casa.punti.map(p => `<li>${p}</li>`).join('');

            document.getElementById('home-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function montreHome() { mostraHome(); }
        function mostraHome() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
