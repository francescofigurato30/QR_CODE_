<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Le Nostre Strutture a San Lucido</title>
    <style>
        :root {
            --bg: #F5F0E8;
            --card-bg: #FFFFFF;
            --text: #1A1A1A;
            --accent: #C4714A;
            --navy: #1E2D40;
            --shadow: 0 4px 15px rgba(30, 15, 5, 0.08);
            --border: rgba(60, 40, 20, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }
        
        header { text-align: center; margin: 15px 0 25px; }
        header h1 { font-size: 1.5rem; color: var(--navy); font-weight: 700; line-height: 1.3; }
        header p { font-size: 0.88rem; color: #666; margin-top: 6px; }

        /* SEZIONI VISTA */
        .view-section { display: none; }
        .active-view { display: block; }

        /* VISTA HOME & SOTTO-MENU - CARDS */
        .menu-case { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .casa-card { background: var(--card-bg); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); cursor: pointer; }
        .casa-card:active { opacity: 0.95; transform: scale(0.99); }
        .casa-card img { width: 100%; height: 190px; object-fit: cover; display: block; }
        .casa-card h2 { padding: 16px; font-size: 1.2rem; text-align: center; color: var(--navy); font-weight: 600; }

        /* PULSANTI SOTTO-MENU SPECIFICI */
        .sub-button { 
            background: var(--card-bg); 
            color: var(--navy); 
            border: 1px solid var(--border); 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 1.05rem; 
            font-weight: 600; 
            text-align: center; 
            cursor: pointer; 
            box-shadow: var(--shadow);
            margin-bottom: 12px;
            display: block;
            width: 100%;
        }
        .sub-button:active { background: #F0EAE1; transform: scale(0.99); }

        /* VISTA DETTAGLIO */
        .dettaglio-casa { background: var(--card-bg); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .btn-indietro { background: var(--navy); color: white; border: none; padding: 11px 18px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; margin-bottom: 20px; cursor: pointer; width: 100%; text-align: center; }
        .btn-indietro:active { opacity: 0.9; }
        
        /* GALLERIA FOTO INTERNA */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .gallery img { width: 100%; height: 115px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); background: #eee; }
        
        /* SEZIONI INFO */
        .info-section { margin-top: 22px; }
        .info-section h3 { font-size: 1.05rem; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid rgba(196,113,74,0.2); padding-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
        .info-section p { font-size: 0.95rem; line-height: 1.5; color: #3A3A3A; }
        
        /* LISTA PUNTI INTERESSE */
        .ul-punti { list-style: none; }
        .ul-punti li { font-size: 0.95rem; padding: 6px 0; color: #3A3A3A; border-bottom: 1px dashed var(--border); }
        .ul-punti li:last-child { border-bottom: none; }

        @media(min-width: 600px) {
            body { max-width: 550px; margin: 0 auto; padding: 30px 16px; }
            .btn-indietro { width: auto; display: inline-block; }
        }
    </style>
</head>
<body>

    <div id="home-view" class="view-section active-view">
        <header>
            <h1>Benvenuti nelle nostre strutture<br>a San Lucido</h1>
            <p>Seleziona la zona per scoprire i nostri appartamenti</p>
        </header>

        <div class="menu-case">
            <div class="casa-card" onclick="mostraSottoMenu()">
                <img src="casa_paese.png" alt="Nel Centro Storico">
                <h2>🏠 Nel Centro Storico</h2>
            </div>
            
            <div class="casa-card" onclick="mostraDettaglio('marina_trilocale')">
                <img src="casa_stazione.png" alt="Nella Marina">
                <h2>🚉 Nella Marina</h2>
            </div>
        </div>
    </div>

    <div id="sub-menu-view" class="view-section">
        <button class="btn-indietro" onclick="cambiaVista('home-view')">← Torna indietro</button>
        <header style="margin-top: 5px;">
            <h1 style="color: var(--accent);">🏠 Nel Centro Storico</h1>
            <p>Scegli la tipologia di alloggio</p>
        </header>
        
        <div style="margin-top: 20px;">
            <button class="sub-button" onclick="mostraDettaglio('centro_bilocale1')">🛏️ Bilocale Piano 1°</button>
            <button class="sub-button" onclick="mostraDettaglio('centro_monolocale')">🚪 Monolocale</button>
            <button class="sub-button" onclick="mostraDettaglio('centro_veranda')">🏡 Bilocale su due piani con veranda</button>
        </div>
    </div>

    <div id="detail-view" class="view-section dettaglio-casa">
        <button id="btn-back-dettaglio" class="btn-indietro">← Torna indietro</button>
        <h1 id="det-titolo" style="color: var(--navy); margin-bottom: 5px;"></h1>
        
        <div class="info-section">
            <h3>📍 Indirizzo e Posizione</h3>
            <p id="det-indirizzo"></p>
        </div>

        <div class="info-section">
            <h3>📸 Galleria Foto</h3>
            <div class="gallery" id="det-gallery"></div>
        </div>

        <div class="info-section">
            <h3>✨ Nelle Vicinanze</h3>
            <ul class="ul-punti" id="det-punti"></ul>
        </div>
    </div>

    <script>
        // Database centralizzato di tutte le strutture
        const strutture = {
            // ALLOGGI CENTRO STORICO
            centro_bilocale1: {
                parentView: 'sub-menu-view',
                titolo: "🛏️ Bilocale Piano 1° - Centro Storico",
                indirizzo: "Centro Storico, San Lucido (CS)", 
                foto: [
                    "Foto qr code casa paese/casa_paese_cucina.jpg",
                    "Foto qr code casa paese/casa_paese_cucina2.jpg",
                    "Foto qr code casa paese/casa_paese_bagno.jpg",
                    "Foto qr code casa paese/casa_paese_camera.jpg",
                    "Foto qr code casa paese/casa_paese_soggiorno.jpg"
                ],
                punti: [
                    "⛪ Vicino alle caratteristiche piazzette del borgo antico",
                    "🍕 Ristoranti, bar e locali tipici raggiungibili a piedi",
                    "🌅 Terrazze panoramiche del Centro Storico nelle immediate vicinanze"
                ]
            },
            centro_monolocale: {
                parentView: 'sub-menu-view',
                titolo: "🚪 Monolocale - Centro Storico",
                indirizzo: "Centro Storico, San Lucido (CS)",
                foto: [], // Inserisci i percorsi foto quando le avrai
                punti: [
                    "🗝️ Ingresso indipendente nel cuore del borgo",
                    "☕ Ideale per coppie, vicino ai servizi principali",
                    "🚶‍♂️ Passeggiata verso il belvedere a pochi passi"
                ]
            },
            centro_veranda: {
                parentView: 'sub-menu-view',
                titolo: "🏡 Bilocale su due piani con veranda",
                indirizzo: "Centro Storico, San Lucido (CS)",
                foto: [], // Inserisci i percorsi foto quando le avrai
                punti: [
                    "🌿 Ampia veranda esterna privata per cene all'aperto",
                    "📐 Struttura disposta su due livelli finemente ristrutturata",
                    "🍷 Situato in un vicolo tranquillo e silenzioso del centro"
                ]
            },
            // ALLOGGI MARINA
            marina_trilocale: {
                parentView: 'home-view',
                titolo: "🚉 Nella Marina - Trilocale",
                indirizzo: "Zona Marina / Lungomare, San Lucido (CS) - A 30 metri dal mare",
                foto: [
                    "Foto qr code casa stazione/casa_stazione_cucina.jpg",
                    "Foto qr code casa stazione/casa_stazione_cucina2.jpg",
                    "Foto qr code casa stazione/casa_stazione_ingresso.jpg",
                    "Foto qr code casa stazione/casa_stazione_soggiorno.jpg",
                    "Foto qr code casa stazione/casa_stazione_camera1.jpg",
                    "Foto qr code casa stazione/casa_stazione_camera1.1.jpg",
                    "Foto qr code casa stazione/casa_stazione_camera2.jpg",
                    "Foto qr code casa stazione/casa_stazione_vista.jpg"
                ],
                punti: [
                    "🏖️ Spiaggia e stabilimenti balneari a soli 30 metri",
                    "🚶‍♂️ Accesso diretto al Lungomare di San Lucido",
                    "🚂 Vicinanza strategica alla stazione e parcheggi comodi"
                ]
            }
        };

        // Funzione per navigare tra le schermate principali
        function cambiaVista(idVista) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            document.getElementById(idVista).classList.add('active-view');
            window.scrollTo(0,0);
        }

        function mostraSottoMenu() {
            cambiaVista('sub-menu-view');
        }

        // Funzione per caricare i dettagli dinamici di un appartamento
        function mostraDettaglio(idStruttura) {
            const dati = strutture[idStruttura];
            if(!dati) return;

            document.getElementById('det-titolo').textContent = dati.titolo;
            document.getElementById('det-indirizzo').textContent = dati.indirizzo;

            // Configura il tasto indietro per tornare alla schermata corretta
            document.getElementById('btn-back-dettaglio').onclick = function() {
                cambiaVista(dati.parentView);
            };

            // Riempie la galleria foto
            if(dati.foto.length > 0) {
                document.getElementById('det-gallery').innerHTML = dati.foto.map(f => {
                    return `<img src="${encodeURI(f)}" alt="Foto alloggio">`;
                }).join('');
            } else {
                document.getElementById('det-gallery').innerHTML = `<p style="color:#888; font-style:italic; padding:10px 0;">Galleria fotografica in corso di aggiornamento...</p>`;
            }

            // Riempie i punti di interesse
            document.getElementById('det-punti').innerHTML = dati.punti.map(p => `<li>${p}</li>`).join('');

            cambiaVista('detail-view');
        }
    </script>
</body>
</html>
